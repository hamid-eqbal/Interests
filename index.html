.top{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--mut);margin-bottom:8px}
.bar{height:6px;background:var(--card2);border-radius:6px;overflow:hidden;margin-bottom:14px}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 18px;flex:1;display:flex;flex-direction:column;justify-content:center;min-height:250px}
.dom{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-bottom:14px}
.q{font-size:25px;font-weight:600;line-height:1.32}
.explain{margin-top:16px}
.explain button{background:transparent;border:1px solid var(--line);color:var(--acc);border-radius:20px;padding:7px 14px;font-size:14px}

.btns{display:flex;gap:12px;margin-top:16px}
.btns button{flex:1;border:none;border-radius:16px;padding:20px 0;font-size:20px;font-weight:700;color:#fff}
.bno{background:var(--no)}.byes{background:var(--yes)}
.btns button:active{transform:scale(.98)}
.hint{text-align:center;color:var(--mut);font-size:12px;margin-top:10px}
.screen{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px}
h1{font-size:24px;margin:0 0 4px}
p.lead{color:var(--mut);margin:0}
.big{background:var(--acc);color:#fff;border:none;border-radius:14px;padding:16px;font-size:18px;font-weight:700;width:100%}
.ghost{background:transparent;border:1px solid var(--line);color:var(--fg);border-radius:14px;padding:14px;font-size:16px;width:100%}
input[type=text]{width:100%;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--card2);color:var(--fg);font-size:17px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px}
.stat h3{margin:0 0 8px;font-size:14px;color:var(--mut);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.row{display:flex;justify-content:space-between;padding:4px 0;font-size:15px;border-bottom:1px solid var(--line)}
.row:last-child{border:none}
.pos{color:var(--yesb)}.neg{color:var(--nob)}
.mut{color:var(--mut)}
small{color:var(--mut)}
a{color:var(--acc)}
textarea.exp{width:100%;height:34vh;min-height:150px;background:var(--card2);color:var(--fg);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12px;font-family:ui-monospace,Menlo,Consolas,monospace;resize:vertical}
.saveln{color:var(--acc);font-size:13px;text-decoration:underline;cursor:pointer}
.okmsg{color:var(--yesb)}
</style>

const GLOSS = {"I-UNK-001": "Linear A is the writing system of the Minoan civilisation on ancient Crete. We can pronounce some signs (they carry over into a later, readable script) yet the underlying language stays unknown, so the words mean nothing to us. Like sounding out a book in a language no one remembers.", "I-UNK-002": "Mammoths, giant sloths, and other huge Ice Age animals died out roughly 10,000-15,000 years ago, and researchers still argue whether human hunting, a warming climate, or both together were the main cause. Think of it as an unsolved whodunit with several plausible suspects and no smoking gun.", "I-UNK-003": "A 19th-century math conjecture claims a precise pattern governs where prime numbers cluster, encoded in a formula called the zeta function. It has been checked against trillions of cases without a counterexample, but nobody has proven it always holds, like being sure a rule works everywhere despite testing only part of an infinite map.", "I-UNK-004": "Physics predicts the Big Bang should have created matter and antimatter in equal amounts, which would have annihilated each other into pure energy, leaving nothing behind. Yet stars, planets, and people exist, so something tipped the balance slightly toward matter, and nobody knows what caused that imbalance.", "I-UNK-005": "Around 1200 BCE, several advanced Mediterranean civilizations, including the Mycenaeans and Hittites, collapsed within a few decades, and trade networks vanished. Proposed causes include invading 'Sea Peoples,' drought, earthquakes, and internal revolt, but no single explanation accounts for the whole region falling apart at once.", "I-UNK-006": "This ancient Greek bronze device, recovered from a shipwreck, used gears precise enough to track planetary motion and predict eclipses, technology not seen again for over a thousand years. Scholars know roughly how its gears worked but not who used it, for what occasions, or how such expertise was lost.", "I-UNK-007": "A small group of people infected with HIV, called 'elite controllers,' keep the virus suppressed for years without medication and never get sick. Researchers have found some of their immune systems behave unusually, but haven't fully explained the mechanism, which could point toward new treatments if solved.", "I-UNK-008": "Some people who catch COVID-19 develop fatigue, brain fog, or breathlessness that lingers for years after the infection clears, while most people recover fully within weeks. Doctors have several theories, including lingering virus fragments, immune overreaction, and tiny blood clots, but no single confirmed cause or reliable cure yet.", "I-UNK-009": "This is a core unsolved computer science question: are problems whose solutions are easy to check, like a finished sudoku, also easy to solve from scratch? Most experts suspect not, but nobody has proven it either way, and a proof would reshape cryptography and computing as we know it.", "I-UNK-010": "Brains are made of neurons firing electrical and chemical signals, yet somehow that produces subjective experience, the feeling of tasting coffee or seeing red. Scientists can map which brain regions activate during awareness, but explaining why physical activity produces inner experience at all remains unsolved.", "I-UNK-011": "Neanderthals thrived across Europe and Asia for hundreds of thousands of years before disappearing around 40,000 years ago, not long after modern humans arrived nearby. Competition, climate shifts, interbreeding, and disease have all been proposed, but researchers still debate which factor mattered most, or whether several combined.", "I-UNK-012": "This early 15th-century book is filled with looping, unknown script and strange illustrations of plants and stars that match no known species. Codebreakers, linguists, and computers have tried for a century to decipher it; some now suspect it may be a genuine unknown language, a code, or an elaborate hoax.", "I-UNK-013": "Physics says the Big Bang should have made equal amounts of matter and antimatter, which annihilate on contact \u2014 leaving an empty universe. Instead matter won by a tiny margin, and everything exists because of that imbalance. Nobody knows what tipped the scales.", "I-UNK-014": "In rare documented cases, tumors shrink or vanish entirely without treatment, sometimes after a fever or infection. Doctors think the immune system may briefly go into overdrive and attack the cancer, similar to how it fights a virus, but why this happens in only a handful of patients remains unexplained.", "I-UNK-015": "This fired-clay disc from Bronze Age Crete has 241 symbols stamped in a spiral, using picture-stamps unlike any other known writing system. Because it's the only object of its kind ever found, there's no second example to compare it against, so its meaning, whether language, calendar, or ritual text, stays guesswork.", "I-UNK-016": "Catching measles once usually protects you for life, but catching a cold barely protects you for a season, even though both trigger an immune response. Researchers don't fully understand why some pathogens leave durable immune memory while others, like the common cold or malaria, allow repeated reinfection.", "I-UNK-017": "String theory, a leading but unproven framework for unifying physics, requires the universe to have extra spatial dimensions beyond the three we experience, tiny and curled up at scales too small to observe. No experiment has ever detected them, so whether they're real or just mathematical convenience is unknown.", "I-UNK-018": "In 1845, two British ships and 129 men vanished while searching for an Arctic sea route; wrecks were found only in 2014 and 2016. Skeletons, notes, and Inuit oral accounts suggest starvation, lead poisoning, and cannibalism, but the fate of the last survivors and their exact final days remain unknown.", "I-UNK-019": "People with fibromyalgia experience widespread chronic pain, fatigue, and tenderness, yet standard scans and blood tests show nothing physically wrong. Researchers suspect the nervous system is amplifying pain signals abnormally, like a volume knob stuck too high, but the underlying trigger and mechanism are still not settled.", "I-UNK-020": "Birds like the Arctic tern fly between hemispheres each year, returning to the same nesting spots with remarkable accuracy. They likely combine the sun's position, star patterns, smell, and Earth's magnetic field like an internal compass, but exactly how their brains integrate all these cues isn't fully understood.", "I-UNK-021": "About 12,900 years ago, the planet plunged back into near-ice-age cold within just decades, disrupting the warming trend that ended the last ice age. Leading theories include a comet impact, meltwater flooding the North Atlantic, or volcanic activity, but which, if any, actually triggered it remains contested.", "I-UNK-022": "Around 5,000 years ago, scribes in what's now Iran wrote thousands of clay tablets in a script called Proto-Elamite, one of the world's oldest writing systems. Numbers and some accounting symbols are partly understood, but the full script has never been read, so its content stays largely a mystery.", "I-UNK-023": "Numbers like the strength of gravity or the mass of an electron seem oddly precise; small changes would make stars or atoms impossible. Some physicists propose a multiverse of many universes with different constants, others look for a deeper law, but no explanation for this apparent 'fine-tuning' is confirmed.", "I-UNK-024": "In 1872, this merchant ship was found drifting in the Atlantic, fully seaworthy and stocked with food, but with no one aboard; the crew was never found, dead or alive. Theories range from a panic over fumes to mutiny or piracy, but no definitive evidence has ever settled the case.", "I-UNK-025": "Octopuses can open jars, solve mazes, and use tools, yet most species live only one or two years and never learn from parents. Scientists don't fully understand how such sophisticated intelligence evolved without the extended childhood or social learning that produces smarts in animals like primates or crows.", "I-UNK-026": "Around 540 million years ago, strange soft-bodied organisms that dominated Earth's oceans for tens of millions of years disappeared just as modern animal body plans suddenly diversified. Whether new predators ate them, environmental shifts squeezed them out, or both, isn't settled from the sparse fossil evidence available.", "I-UNK-027": "A small number of people can tolerate doses of certain toxins or medications that would harm or kill most others, sometimes due to rare genetic variants affecting how the body processes chemicals. Researchers have identified a few specific genes involved, but many cases of unusual resistance remain scientifically unexplained.", "I-UNK-028": "Mathematicians agree on results like 2+2=4, but disagree on what math actually is: a pre-existing truth we uncover, like a distant planet, or a human-built language, like chess rules. This centuries-old philosophical question has no experiment that could settle it, only competing arguments.", "I-UNK-029": "In 1587, English colonists settled Roanoke Island in what's now North Carolina; when a supply ship returned three years later, everyone was gone, leaving only the word 'Croatoan' carved into a post. Theories include assimilation with local tribes, starvation, or attack, but no bodies or definitive trail were ever found.", "I-UNK-030": "Deja vu is the eerie feeling that a new experience has happened before, even though it hasn't. Researchers suspect it involves a brief misfire in memory circuits, where the brain briefly flags a new scene as familiar, but they can't yet reliably trigger or fully explain the sensation.", "I-UNK-031": "About 8% of human DNA consists of leftover genetic material from ancient viruses that infected our distant ancestors and got permanently copied into the genome over millions of years. Most fragments are broken and inactive, but why so much survived, and what role remnants still play, isn't fully mapped.", "I-UNK-032": "The Great Pyramid of Giza contains massive stone blocks fitted with remarkable precision, some aligned to within a fraction of a degree of true north. Archaeologists have proposed copper tools, ramps, and large labor forces as methods, but exactly how ancient builders achieved this accuracy without modern instruments is debated.", "I-UNK-033": "People with perfect pitch can name or reproduce any musical note without a reference tone, a rare skill found in roughly 1 in 10,000 people. It's linked to early musical training and possibly specific genes, but why only some trained musicians develop it while most never do isn't fully explained.", "I-UNK-034": "Some theories that try to unify physics only work if space has extra dimensions beyond the three we move through, curled up too small to notice. Imagine a tightrope: to us it's a one-dimensional line, but to an ant it also has a tiny loop around its width.", "I-UNK-035": "The Indus Valley civilization built sophisticated cities with drainage systems and standardized weights, then declined and its cities were largely abandoned around 1900 BCE. Climate change, river shifts, and declining trade are candidate causes, but because the script remains unread, we lack the civilization's own account of what happened.", "I-UNK-036": "Honeybees navigate miles from their hive and communicate the location of food to other bees through a 'waggle dance,' despite having a brain smaller than a grain of rice. How such a tiny number of neurons encodes distance, direction, and memory this efficiently is still being studied.", "I-UNK-037": "About 252 million years ago, roughly 90% of marine species and 70% of land species died out in Earth's worst extinction event. Massive volcanic eruptions in what's now Siberia are the leading suspect, likely triggering climate change and ocean poisoning, but the precise chain of cause and effect is unresolved.", "I-UNK-038": "Everyone dreams during sleep, often vividly, yet scientists disagree on why. Leading ideas include consolidating memories, rehearsing threats, or simply being a side effect of brain activity during sleep with no function at all, like static on a screen. No single theory has been conclusively proven.", "I-UNK-039": "Take any whole number: if it's even, halve it; if odd, triple it and add one; repeat. Every number ever tested eventually spirals down to 1, but nobody has proven this happens for all numbers, making it one of math's simplest-sounding yet still unsolved puzzles.", "I-UNK-040": "The Etruscans, who dominated central Italy before Rome's rise, left thousands of inscriptions we can pronounce and partly translate, mostly names and short religious phrases. But their everyday spoken language, its full grammar, and how ordinary Etruscans actually talked to each other remains largely a mystery.", "I-UNK-041": "Among the Dead Sea Scrolls is one etched on copper listing dozens of locations supposedly hiding vast quantities of gold, silver, and other treasure. No listed treasure has ever been found, and scholars still debate whether it describes a real hidden hoard, a symbolic text, or an elaborate fiction.", "I-UNK-042": "Migraines bring intense head pain, nausea, and light sensitivity to millions of people, and researchers know they involve nerve signaling and blood vessel changes in the brain. But the exact chain of events that starts an attack, and why triggers like stress or certain foods matter, is still unclear.", "I-UNK-043": "A colony of ants can build complex nests, farm fungus, and wage coordinated wars, acting almost like one organism made of thousands of tiny bodies, even though no single ant is directing it. How this collective intelligence emerges from simple individual behaviors is still being actively researched.", "I-UNK-044": "This US Navy cargo ship, carrying over 300 people, vanished somewhere in the Atlantic in 1918 without sending a distress signal, and no wreckage has ever been found. Overloading, a storm, structural failure, or even wartime attack have all been proposed, but the exact cause remains completely unknown.", "I-UNK-045": "Neanderthals had a hyoid bone and hearing range similar to modern humans, suggesting they could physically produce complex speech. But because language leaves no fossils, whether they actually used grammar-rich language like ours, simple signals, or something in between can't be directly confirmed from physical remains alone.", "I-UNK-046": "The appendix was long dismissed as a useless evolutionary leftover, since removing it causes no obvious harm. More recent research suggests it may store beneficial gut bacteria as a 'safe house' during illness, but whether that's its true evolutionary purpose or an incidental side benefit is still debated.", "I-UNK-047": "This remarkable city of stone islets built on a Pacific reef near Micronesia was a political and ceremonial center for centuries before being abandoned around the 1600s. Disease, resource depletion, or political collapse are candidate explanations, but limited written records from the region leave the true cause unresolved.", "I-UNK-048": "Certain meteorites, like fragments of the Murchison meteorite, contain amino acids, the building blocks of proteins, including some variants never seen in Earth life. This suggests these molecules can form naturally in space, but how much this tells us about the origin of life on Earth remains unclear.", "I-UNK-049": "The Big Bang theory describes the universe expanding from an extremely hot, dense state roughly 13.8 billion years ago. But whether that was an absolute beginning of time, or one bounce in an endless cycle of expansions and contractions, is a question current physics can't yet answer.", "I-UNK-050": "After building the pyramids, Egypt's Old Kingdom fragmented around 2181 BCE into a chaotic period of rival rulers and famine. A severe multi-decade drought tied to weakened Nile floods is a leading suspect, but how much blame belongs to climate versus political rivalry among regional governors isn't settled.", "I-UNK-051": "Many older adults recall childhood or early-adulthood events in unusually sharp detail, a pattern researchers call the 'reminiscence bump.' It may relate to how the brain forms identity during youth, but why these decades-old memories stay so vivid while recent ones fade faster isn't fully explained.", "I-UNK-052": "That frustrating feeling of knowing a word exists, sensing its length or first letter, but being unable to say it happens to almost everyone occasionally. Researchers think it reflects a partial breakdown in the brain's link between meaning and sound, but the precise mechanism isn't fully mapped.", "I-UNK-053": "Twin primes are pairs of prime numbers that differ by two, like 11 and 13. Mathematicians have found twin primes far out into enormous numbers and believe there are infinitely many, but nobody has proven this, one of the oldest open questions in number theory.", "I-UNK-054": "The Ancestral Puebloans built elaborate multi-story stone complexes in Chaco Canyon, New Mexico, then largely abandoned the region by the 1200s. Drought and resource strain are likely factors, and descendants live on among modern Pueblo peoples, but exactly why and how the exodus from Chaco unfolded is still researched.", "I-UNK-055": "In autoimmune diseases, the immune system mistakenly attacks the body's own tissue, but oddly, each disease usually zeroes in on one target, like joints in rheumatoid arthritis or the thyroid in Hashimoto's. Why the immune system picks that particular tissue rather than attacking everywhere isn't well understood.", "I-UNK-056": "Some people under anesthesia, near death, or in extreme stress report feeling as though they floated outside their own body and watched events from above. Researchers link this to disrupted signals in brain regions that process body position and self-awareness, but the exact trigger remains only partly understood.", "I-UNK-057": "We know several extinct human relatives existed, including Neanderthals, Denisovans, and small-bodied Homo floresiensis, mostly from scattered, incomplete fossil finds. Given how rarely fossils form and survive, researchers suspect other hominin species may have existed and left no trace found yet, hidden somewhere in unexplored sediment layers.", "I-UNK-058": "Hundreds of near-perfectly round stone spheres, some over six feet across, were carved by ancient peoples in Costa Rica starting around 600 CE. Archaeologists think they marked social status or aligned with astronomical or geographic features, but no written record survives to confirm their intended meaning or use.", "I-UNK-059": "Some people with damage to their visual brain regions report seeing nothing, yet can still accurately point to or dodge objects placed in their 'blind' field when asked to guess. This suggests a secondary visual pathway processes information outside conscious awareness, though how it works isn't fully mapped.", "I-UNK-060": "The Hittite Empire, a major Bronze Age power centered in modern Turkey, controlled a vast territory and rivaled Egypt, then collapsed and its capital was abandoned around 1200 BCE, part of the wider Bronze Age collapse. Invasion, famine, and internal breakdown are candidates, but the precise trigger is unclear.", "I-UNK-061": "A handful of stars, based on their brightness and composition, seem to be older than the universe itself under standard calculations, an apparent contradiction. Astronomers think measurement errors in distance or stellar models likely explain most cases, but a few puzzling outliers haven't been fully resolved yet.", "I-UNK-062": "SIDS is the sudden, unexplained death of an otherwise healthy infant, usually during sleep, with no cause found even after full investigation. Researchers have identified risk factors like stomach sleeping and smoke exposure that lower risk when avoided, but the underlying biological mechanism that actually causes death is unknown.", "I-UNK-063": "Unlike most European languages, Etruscan doesn't clearly belong to the Indo-European language family that includes Latin, Greek, and English. A related language once spoken on the island of Lemnos hints at a small language family, but whether Etruscan has any other living or documented relatives remains unresolved.", "I-UNK-064": "Cells accumulate damage over time, including shortened chromosome caps, protein buildup, and faulty energy production, and researchers have identified many contributing mechanisms of aging. But no single unified cause has been confirmed, and scientists still debate whether aging is one process or many separate ones happening together.", "I-UNK-065": "Ancient Alexandria's library was reputed to hold hundreds of thousands of scrolls, the largest collection of knowledge in the ancient world, before being lost through fires, neglect, and political upheaval over centuries. Almost none of its actual contents survive, so what unique texts and knowledge vanished remains unknown.", "I-UNK-066": "About 90% of people are right-handed, a ratio that's stayed roughly consistent across cultures and history. Genetics plays a role, but no single 'handedness gene' has been found, and environmental factors during development are also suspected, leaving the precise cause of hand preference still not fully explained.", "I-UNK-067": "Certain rivers flow at the surface for a stretch, then disappear into underground channels through porous rock, sometimes reappearing miles away or after long gaps. Geologists understand the general process, called a losing stream, but predicting exactly when and why specific rivers shift their underground paths over centuries is difficult.", "I-UNK-068": "Cahokia, near modern St. Louis, was once North America's largest city north of Mexico, home to tens of thousands of people and massive earthen mounds. It was fully abandoned by around 1400 CE; drought, deforestation, and social conflict are proposed causes, but no single confirmed explanation exists.", "I-UNK-069": "Octopus eyes and human eyes look strikingly alike, both have a lens, retina, and iris, despite evolving completely independently along very different evolutionary branches separated by hundreds of millions of years. Researchers study this 'convergent evolution' to understand why so few eye designs work well, but full details remain elusive.", "I-UNK-070": "This 2,300-year-old Peruvian site includes thirteen stone towers spaced along a ridge that mark the sun's rising and setting positions across the year, functioning as a solar calendar. Archaeologists know it tracked the sun, but whether it also served ceremonial, agricultural, or political purposes isn't fully confirmed.", "I-UNK-071": "Everyday experience says time only moves forward, eggs break but never unbreak, yet the basic equations of physics work equally well running backward. Physicists tie our sense of time's direction to increasing disorder, but whether time itself has fundamental directionality, or that's just an emergent effect, is unresolved.", "I-UNK-072": "Around 10-20 million years ago, many ape species that once thrived across Europe, Asia, and Africa declined sharply, leaving only a few surviving lineages including the ancestors of modern great apes and humans. Climate cooling and shrinking forests are suspected causes, but the fossil record leaves real gaps.", "I-UNK-073": "A small fraction of people, called super-recognizers, can identify faces they've seen only briefly years earlier, even in a crowd or from an odd angle, a skill some police forces now recruit for. Researchers link it to specialized brain processing, but what makes these people's brains different isn't fully known.", "I-UNK-074": "The Dorset people lived across Arctic North America for over a thousand years, skilled at hunting sea mammals without dog sleds or bows, before vanishing around 1000-1500 CE as Thule culture ancestors of the Inuit arrived. Whether they were absorbed, displaced, or died out separately is still debated.", "I-UNK-075": "Gravity is astonishingly weak compared to the other basic forces of nature; a small magnet can lift a paperclip against the gravitational pull of the entire Earth. Physicists have proposed ideas like gravity 'leaking' into hidden extra dimensions, but no confirmed explanation for this huge imbalance exists yet.", "I-UNK-076": "Starting around the 1300s, parts of the world entered several centuries of unusually cold winters and shortened growing seasons, disrupting agriculture across Europe. Reduced solar activity, volcanic eruptions, and shifting ocean currents are all proposed triggers, but researchers still debate which factor set off the cooling first.", "I-UNK-077": "Great Zimbabwe was a major stone-built trading city that grew wealthy from gold and ivory exchanged with distant coastal traders, then declined and was largely abandoned by the 1500s. Resource depletion, political fragmentation, and trade route shifts are candidate causes, but no definitive account confirms which mattered most.", "I-UNK-078": "Some fish species are known only from dead specimens caught in nets or found washed ashore, because the extreme pressure, cold, and darkness of the deep ocean make direct observation extremely difficult. Their living behavior, habitat use, and even accurate appearance in life remain essentially unknown to science.", "I-UNK-079": "The Mariana Trench, the deepest known point in Earth's oceans, has been visited by only a handful of manned or robotic missions due to crushing pressure over a thousand times that at sea level. Vast stretches remain unmapped, and many organisms and geological features there are still undiscovered.", "I-UNK-080": "The Sahara has cycled between lush, grassy savanna and harsh desert roughly every 20,000 years, driven by slow wobbles in Earth's tilt that shift monsoon rainfall patterns. Researchers understand this general rhythm, but predicting the sharp, sometimes rapid tipping points between green and desert states is still difficult.", "I-UNK-081": "Antarctica's ice sheet, in places over two miles thick, hides mountain ranges, hidden lakes, and canyons that have never been directly seen, mapped only indirectly through radar and satellite data. What geological features, and potentially ancient microbial life, exist beneath the ice remains largely unexplored territory.", "I-UNK-082": "A perfect number equals the sum of its own divisors, like 6 (1+2+3). All known perfect numbers are even, and mathematicians have searched extensively without finding an odd one, but nobody has proven odd perfect numbers are impossible, one of number theory's oldest unresolved questions.", "I-UNK-083": "Chess has a finite, though astronomically large, number of possible positions, so in principle a perfect move exists for every position. But the total is far too vast for any computer to fully calculate, so chess has never been 'solved' the way simpler games like checkers have been.", "I-UNK-084": "This mysterious and often fatal illness struck England repeatedly between 1485 and 1551, killing quickly with sweating and fever, then disappeared entirely and has never recurred. Because no pathogen sample survives, researchers can only guess at the cause from historical descriptions, and why it vanished for good is unknown.", "I-UNK-085": "Bottlenose dolphins develop a unique whistle in early life that functions like a name, used by others to call or refer to that individual even when it's not present. Researchers have confirmed this pattern, but how dolphins encode and recognize such specific 'names' acoustically isn't completely understood.", "I-UNK-086": "Many plants flower only after experiencing a specific number of daylight hours, a process called photoperiodism, timing blooms precisely to season. Researchers have identified some of the molecular signals plants use to track day length, but exactly how cells 'count' and remember accumulated light exposure isn't fully mapped.", "I-UNK-087": "Some major eruptions, like Mount Pinatubo in 1991, measurably cool the entire planet for a year or two by injecting sulfur particles high into the atmosphere. Other similarly large eruptions barely affect global climate, and scientists still can't fully predict which combination of factors decides the difference.", "I-UNK-088": "Every zebra has a distinct stripe pattern, as individual as a human fingerprint, and no two are exactly alike. Leading theories suggest the stripes help confuse biting flies or predators, or aid individual recognition, but why the process also produces this much personal-level uniqueness isn't fully explained.", "I-UNK-089": "A small number of children, sometimes on the autism spectrum, can play complex music by ear or reproduce a piece after hearing it once, with no formal training. Researchers link this to unusual brain wiring around memory and pattern recognition, but the precise mechanism producing such rare talent is unclear.", "I-UNK-090": "Some traits, like certain eye colors or genetic conditions, seem to disappear for a generation and then reappear in grandchildren, because they're carried on recessive genes that need two copies to show up. Predicting exactly when and in whom a hidden trait will resurface is still often difficult.", "I-UNK-091": "For life to begin, some molecule had to start copying itself using only the raw chemistry available on the young Earth roughly 4 billion years ago. Scientists have made candidate molecules like RNA self-replicate in labs under specific conditions, but the exact real-world pathway that kicked off life remains unproven.", "I-UNK-092": "If no conscious being had ever existed, would it still be true that 2+2=4, or would mathematics simply not exist without minds to think it? Philosophers split between 'platonists,' who think math exists independently, and others who see it as a human invention, with no way to settle the debate empirically.", "I-UNK-093": "Human senses only detect a narrow slice of reality, visible light is a tiny fraction of the electromagnetic spectrum, for instance, and our brains are built to process information useful for survival, not necessarily truth. What lies permanently beyond human perceptual and cognitive limits can't be fully known from inside those limits.", "I-UNK-094": "Some philosophers argue there could be true facts about reality that no possible mind, however advanced, could ever discover or verify, permanently unknowable in principle, not just due to current technology. Whether such facts exist, and what they might even look like, is itself an unanswerable question.", "I-UNK-095": "A calculator produces correct math without 'understanding' numbers, and some philosophers argue advanced AI systems that predict convincing text may be doing something similar, sophisticated pattern matching without genuine comprehension. There's no agreed test that can reliably distinguish true understanding from a very good imitation of it.", "I-UNK-096": "Across vastly different economies and eras, wealth distribution tends to follow a similar lopsided mathematical pattern, where a small percentage of people hold a large share of resources. Economists have modeled how this pattern emerges from simple exchange dynamics, but why it recurs so consistently isn't fully agreed upon.", "I-UNK-097": "Financial models built on historical data and rational-investor assumptions have repeatedly failed to foresee major crashes, like 2008, before they happened. Panic, herd behavior, and complex interconnections between institutions all play roles, but predicting exactly when and why confidence suddenly collapses remains beyond current economic models.", "I-UNK-098": "Purely by the random luck of who has sons versus daughters and how many children survive, some family surnames spread widely over generations while others die out completely, even without any external cause. Mathematicians can model this randomness, but predicting which specific lines will vanish isn't possible in advance.", "I-UNK-099": "The Akkadian Empire, often considered the world's first empire, unified much of Mesopotamia around 2334 BCE, then collapsed within roughly a century. A severe, centuries-long drought recorded in soil samples is a leading suspect, but internal rebellion and invasion likely played roles too, and the full story isn't settled.", "I-UNK-100": "The Olmec, considered Mesoamerica's earliest major civilization, built large ceremonial centers and colossal stone heads before declining sharply around 400 BCE, with some sites showing signs of deliberate destruction. Environmental change, internal conflict, and shifting trade routes are candidates, but no confirmed single cause has been established.", "I-UNK-101": "The Bronze Age Minoan civilization on Crete, known for elaborate palaces and vivid frescoes, declined after roughly 1450 BCE. A massive volcanic eruption on nearby Santorini is a popular suspect, but its timing doesn't cleanly match the decline, and invasion or internal upheaval may have contributed as well.", "I-UNK-102": "Gobekli Tepe in Turkey features massive carved stone pillars arranged in circles, built around 9500 BCE by hunter-gatherers before farming or permanent settlements existed nearby. Archaeologists know it required organized labor, but who directed the effort and its exact religious or social purpose is still not clear.", "I-UNK-103": "Narrow shafts inside some Egyptian pyramids, too small for a person to pass through, are inscribed with religious texts and seem to align with specific stars. Egyptologists broadly agree they relate to the pharaoh's journey to the afterlife, but their precise intended function and full symbolic meaning remain debated.", "I-UNK-104": "Genetic evidence suggests the entire human population may have shrunk dramatically around 70,000 years ago, roughly coinciding with the massive Toba volcanic eruption in Indonesia. Whether the eruption's climate effects actually caused this bottleneck, or the timing is coincidental with other pressures, is still actively debated by researchers.", "I-UNK-105": "Axolotls, a type of salamander, can regrow entire limbs, spinal cord tissue, and even parts of their brain after injury, something almost no other animal, including mammals, can do. Scientists are studying their unique cellular signaling in hopes of applying it to human medicine, but the full mechanism isn't solved.", "I-UNK-106": "A massive asteroid struck Earth about 66 million years ago and is widely accepted as the main cause of the dinosaur extinction, but massive volcanic eruptions in India were also occurring around the same time. Whether the asteroid alone was decisive, or the two events combined, is still debated.", "I-UNK-107": "Humans can distinguish over a trillion different scents using hundreds of different smell receptors that combine in complex patterns, unlike the simpler, well-mapped system for color vision. Because so many receptor combinations are possible, scientists still haven't fully cataloged which receptor patterns correspond to which specific smells.", "I-UNK-108": "Around 34-38 million years ago, vast resin-producing forests in what's now the Baltic region produced the amber later mined for jewelry and fossils, then the ecosystem disappeared. Climate cooling is suspected, but the specific forest composition and exact reasons for its disappearance remain incompletely understood from fossil evidence.", "I-UNK-109": "Soft tissues like skin, blood vessels, and proteins normally decay quickly, yet a handful of dinosaur and other ancient fossils have shown preserved soft material tens of millions of years old. Researchers debate whether rare mineral conditions or unusual preservation chemistry explain these exceptional, still poorly understood cases.", "I-UNK-110": "In 1937, pilot Amelia Earhart and navigator Fred Noonan disappeared over the Pacific Ocean while attempting to fly around the world, their last radio transmissions cutting off near Howland Island. Despite extensive searches and various theories, including crash landing or castaway survival, no confirmed wreckage or remains have ever been found.", "I-UNK-111": "This 14th-century BCE shipwreck off Turkey's coast held a remarkably diverse cargo, copper, glass, ivory, and goods from at least seven different cultures, showing Bronze Age trade was more extensive than previously known. But exactly how such far-flung trade networks were organized and operated is still being pieced together.", "I-UNK-112": "Most languages belong to families that share a common ancestor, like the Romance languages descending from Latin. But a handful of languages, called language isolates, have no proven relatives at all, and linguists don't fully understand why their connections to other languages, if any ever existed, vanished entirely.", "I-UNK-113": "All humans use complex language, but because speech leaves no physical trace and writing appeared only a few thousand years ago, there's no direct evidence of how or when full language first developed among our ancestors, likely tens of thousands or more years earlier. Only indirect clues survive.", "I-UNK-114": "Basque, spoken in parts of Spain and France, doesn't fit into the Indo-European family that includes Spanish and French, and linguists haven't convincingly linked it to any other known language family. It appears to predate the arrival of Indo-European languages in Europe, but its true origins remain unresolved.", "I-UNK-115": "This undeciphered script was used on the island of Cyprus roughly 3,400 years ago, likely to record a now-unknown language, appearing on clay tablets and other objects. Without a bilingual text linking it to a known language, researchers can identify individual signs but not confidently read what any of it says.", "I-UNK-116": "Lake Chad in central Africa has shrunk and expanded dramatically over centuries and again in recent decades, at times losing over 90% of its area. Climate shifts, reduced rainfall, and increased water use for irrigation all contribute, but the precise balance of natural versus human causes is still studied.", "I-UNK-117": "These microscopic animals can survive being frozen solid, dried out completely, boiled, or exposed to radiation and even the vacuum of space by entering a suspended, near-lifeless state. Researchers have found some of the protective proteins involved, but the full mechanism of how they revive unharmed isn't completely mapped.", "I-UNK-118": "This enormous deer, with antlers spanning up to 12 feet, roamed Europe and Asia until going extinct around 7,700 years ago, well after the last ice age ended. Whether hunting, habitat loss, or the sheer biological cost of maintaining such huge antlers drove the extinction is still debated.", "I-UNK-119": "Many people narrate their thoughts internally in words, but research suggests a significant portion of people think without any inner verbal voice at all, relying instead on images or abstract impressions. Why human cognition varies this much between individuals, and what it means for thinking itself, isn't fully understood.", "I-UNK-120": "Elements get less stable as their atomic nuclei grow larger, and most very heavy elements decay within seconds of being created in labs. Physicists predict a theoretical 'island of stability' among superheavy elements that hasn't been fully confirmed, so the true upper limit of possible elements remains uncertain.", "I-UNK-121": "Amino acids, the building blocks of proteins, can form in two mirror-image versions, like left and right hands, but every living thing on Earth uses only the left-handed version. Why life settled on just one form rather than a mix, early in evolutionary history, remains an open question.", "I-UNK-122": "RNA, a molecule central to how life stores and copies information, is complex enough that scientists still aren't sure how its building blocks assembled from simpler chemicals on the early Earth without any life already present to help. Lab experiments have made progress, but the full pathway is unproven.", "I-UNK-123": "The periodic table's neat, repeating patterns of chemical behavior start to break down for the heaviest artificially created elements, because their electrons move fast enough to be affected by relativistic effects predicted by Einstein's physics. Predicting exactly how these super-heavy elements will behave chemically is still difficult.", "I-UNK-124": "Superconductors carry electricity with zero resistance, but only at extremely cold temperatures requiring expensive cooling, limiting practical use. Researchers keep finding materials that superconduct at higher temperatures, and some disputed claims of room-temperature superconductivity have been made and retracted, but no confirmed material has yet achieved it reliably.", "I-UNK-125": "Impact craters are usually confirmed by finding fragments of the meteorite or telltale shocked minerals at the site. But some craters show clear signs of an impact, like a well-formed crater shape, with no recovered impactor material at all, likely because it vaporized completely or fragments were never located.", "I-XPO-001": "Gutenberg's press, invented around 1440, made books cheap enough to spread literacy, new ideas, and the Reformation across Europe within decades. Without it, history speculates that information would have stayed hand-copied and rare, likely slowing scientific and religious upheaval, though nobody can say by exactly how much.", "I-XPO-002": "The Western Roman Empire collapsed by 476 CE, fragmenting into the kingdoms that became medieval and modern Europe. If it had endured, historians speculate Europe might have kept unified law, roads, and language longer, though whether that would have sped up or delayed technological and political change is unknowable.", "I-XPO-003": "Ancient Alexandria's great library, holding a vast collection of classical knowledge, was gradually lost through fires and neglect over centuries. Had it survived intact, some historians speculate lost scientific and literary works might have accelerated later discoveries, though how much any single library would have changed history is debated.", "I-XPO-004": "Genghis Khan united Mongol tribes and built the largest contiguous land empire in history, reshaping trade, warfare, and populations across Eurasia. Without him, historians speculate the Mongol tribes might have stayed fragmented and regional powers like China, Persia, and Russia could have developed quite differently, though this is necessarily speculative.", "I-XPO-005": "The Black Death killed an estimated third of Europe's population in the 1300s, and the resulting labor shortages are credited by some historians with weakening feudalism and raising wages for survivors. Without the plague, some speculate feudal structures might have persisted longer, though this connection is debated among historians.", "I-XPO-006": "Columbus's 1492 voyage triggered sustained European contact with the Americas, though Norse explorers had reached North America centuries earlier without lasting colonization. Had Columbus's voyage failed, historians speculate another European expedition likely would have made contact within decades regardless, given the era's active exploration momentum.", "I-XPO-007": "Constantinople fell to the Ottoman Empire in 1453, ending the thousand-year-old Byzantine Empire and reshaping trade routes between Europe and Asia. Had it survived, some historians speculate it might have continued as a buffer between Europe and expanding Islamic empires, though its declining strength by then makes long survival questionable.", "I-XPO-008": "The Cold War between the US and Soviet Union stayed 'cold,' avoiding direct large-scale combat partly due to the threat of mutual nuclear destruction. Historians and strategists have modeled scenarios where conflict escalated into open war, generally concluding it likely would have caused catastrophic, possibly civilization-altering destruction on both sides.", "I-XPO-009": "Napoleon's defeat at Waterloo in 1815 ended his rule and led to decades of conservative political order across Europe. Had he won, historians speculate he might have retained power for a time, but faced continued coalition resistance from other European powers, making a lasting Napoleonic empire uncertain.", "I-XPO-010": "Sustained European contact with the Americas beginning in 1492 brought colonization, disease, and cultural upheaval that devastated Indigenous populations. Without that contact, historians speculate Indigenous civilizations might have continued developing independently for longer, though eventual contact through other means was likely given global exploration trends of the era.", "I-XPO-011": "The Wright brothers achieved powered flight in 1903, but several other inventors worldwide were pursuing similar goals around the same time. Had their specific attempt failed for good, aviation historians generally agree powered flight likely would have been achieved by another team within a few years regardless.", "I-XPO-012": "The Suez Canal, opened in 1869, dramatically shortened shipping routes between Europe and Asia by avoiding the trip around Africa. Without it, historians speculate global trade and colonial shipping patterns would have relied longer on the Cape route, likely slowing trade growth and shaping different geopolitical priorities in the region.", "I-XPO-013": "This 1914 assassination in Sarajevo is often cited as the spark that triggered World War I, though rising tensions between European alliances made some conflict likely regardless. Historians debate whether a failed assassination would have delayed war by years or if another incident would have ignited it similarly.", "I-XPO-014": "World War I ended in German defeat, reshaping European borders and setting conditions historians link to the rise of Nazism decades later. Had Germany won instead, some historians speculate a different, possibly more stable European order might have emerged, though this remains a debated and unverifiable counterfactual.", "I-XPO-015": "The US Manhattan Project developed the first nuclear weapons, used to end World War II in the Pacific in 1945. Had it failed, historians speculate the war might have continued longer through conventional invasion of Japan, likely causing substantially higher casualties on both sides, though exact outcomes are unknowable.", "I-XPO-016": "The Soviet Union dissolved in 1991 after economic stagnation and political reform efforts, reshaping global power structures. Had it persisted, historians speculate the Cold War-era balance of power, along with different paths for Eastern Europe and Central Asia, might have continued, though the USSR's internal strains made collapse likely eventually.", "I-XPO-017": "Writing emerged independently in a few places starting around 3200 BCE, enabling record-keeping, law, and accumulated knowledge across generations. Historians speculate that earlier writing might have accelerated the spread and preservation of ideas and technology, though whether other social conditions were ready to support writing that early is unclear.", "I-XPO-018": "Potatoes, domesticated in the Andes, were brought to Europe after 1492 and became a staple crop that historians credit with supporting population growth in places like Ireland and Northern Europe. Without that transfer, agricultural historians speculate those regions might have relied longer on grain crops, potentially limiting population growth.", "I-XPO-019": "Mongol armies swept through Eastern Europe in the 1200s before withdrawing, partly due to the death of a khan requiring succession decisions back home. Had they continued westward, historians speculate Western European kingdoms could have faced devastating conquest, though rough terrain and logistics may have limited how far campaigns could go.", "I-XPO-020": "The Panama Canal, completed in 1914, let ships cross between the Atlantic and Pacific without sailing around South America, transforming global shipping and trade. Without it, historians speculate shipping costs and times would have stayed much higher, likely shaping different patterns of trade and naval strategy in the Americas.", "I-XPO-021": "Self-checkout, automated warehouses, and AI-driven inventory systems are already reducing retail staffing needs. If automation eventually replaces most retail jobs, economists project major shifts in employment patterns and shopping experiences, though the pace and social response, retraining, new job categories, or income support, remain genuinely uncertain.", "I-XPO-022": "Robots that help with mobility, medication reminders, and companionship for elderly people are already in early development and limited use in countries like Japan. If they become widespread, researchers project changes to caregiving labor and independent living, though how people will emotionally adapt to robotic care remains speculative.", "I-XPO-023": "National borders currently structure law, trade, and citizenship worldwide, and no serious near-term plan exists to eliminate them. As a thought experiment, political theorists speculate a borderless world would require entirely new systems for governance, resource allocation, and identity, a scenario useful for probing today's border-dependent assumptions.", "I-XPO-024": "Automation and productivity gains have fueled long-running debate about whether most paid work could eventually become optional, supported by measures like universal basic income. Economists and sociologists speculate this could reshape identity and purpose currently tied to jobs, but no economy has fully tested this scenario at scale.", "I-XPO-025": "Many countries have committed to reducing fossil fuel use for climate reasons, with electric vehicles and renewable energy already expanding rapidly. A full phase-out would likely change transportation, heating, and manufacturing, and researchers project varying outcomes depending on how quickly clean alternatives scale and how costs are distributed.", "I-XPO-026": "Climate scientists project meter-scale sea level rise is plausible within a century or two under current warming trends, threatening many coastal cities. Urban planners are already studying responses like elevated infrastructure, sea walls, and managed retreat from vulnerable areas, though which strategies cities will actually adopt remains uncertain.", "I-XPO-027": "Thousands of languages are spoken worldwide today, and no serious global effort exists to replace them with one shared tongue. As a thought experiment, linguists speculate this could ease communication but risk erasing cultural nuance carried by individual languages, a useful lens for exploring language's role in identity.", "I-XPO-028": "AI tools that summarize news and candidate positions for individual users are already emerging, and some voters increasingly rely on them for information. If this becomes widespread, researchers project changes to how people form political opinions, though whether this improves informed voting or increases susceptibility to bias remains debated.", "I-XPO-029": "Remote work expanded substantially after 2020, already reducing office demand in many cities without eliminating in-person work entirely. If it became fully universal, urban economists project major shifts in commercial real estate and city populations, though many jobs, in healthcare, manufacturing, and services, inherently require physical presence.", "I-XPO-030": "Global population growth is already slowing, and demographers project the world population may peak and begin declining later this century as birth rates fall in many countries. Economists speculate this could strain pension systems and labor markets, prompting policy responses like immigration reform or automation, though the exact response is uncertain.", "I-XPO-031": "Cash use is already declining in many countries as digital payments expand, though a fully cashless global economy doesn't yet exist anywhere. Researchers project a complete shift could reshape privacy, financial inclusion for the unbanked, and government oversight of transactions, with outcomes depending heavily on how such systems are designed.", "I-XPO-032": "Climate-related displacement is already growing, but international refugee law currently doesn't formally recognize 'climate refugees' as a protected category the way it does for war and persecution. Legal scholars speculate that a shift toward more climate displacement could eventually force new international agreements, though none currently exist.", "I-XPO-033": "Some jurisdictions already use limited digital or online voting, but frequent, continuous digital voting on issues rather than periodic elections isn't broadly implemented. Political scientists speculate this could increase responsiveness to public opinion but also raises security and manipulation risks that current systems aren't fully designed to handle.", "I-XPO-034": "Arctic sea ice is measurably shrinking due to climate change, and Arctic shipping routes like the Northern Sea Route are already seeing increased seasonal use. As retreat continues, maritime analysts project shorter routes between Asia, Europe, and North America could become viable, though ice variability and infrastructure gaps remain real obstacles.", "I-XPO-035": "A 'post-scarcity' economy, where basic goods like food and housing are abundant and cheap enough to be nearly free, doesn't currently exist anywhere, though automation has lowered costs for some goods. Economists debate whether resource limits and distribution problems mean true post-scarcity is achievable at all.", "I-XPO-036": "No permanent human settlement on Mars currently exists, though organizations like NASA and SpaceX have published concept plans involving pressurized habitats and local resource use. Engineers speculate about designs based on known Martian conditions, but many technical challenges, radiation, life support, self-sufficiency, remain unsolved in practice.", "I-XPO-037": "No confirmed signal from an alien civilization has ever been detected, despite decades of searching by projects like SETI. If one were found, researchers and policy bodies have drafted general protocols for verification and disclosure, but how governments and the public would actually respond remains genuinely speculative.", "I-XPO-038": "Some private companies have proposed asteroid mining for metals like platinum, though no commercial asteroid mining operation exists yet due to cost and technical barriers. Economists project that if it became viable at scale, it could sharply lower prices for certain rare metals, though timelines remain highly uncertain.", "I-XPO-039": "A space elevator, a cable stretching from Earth's surface to orbit, has been proposed as a way to reach space without rockets, but no material strong enough to build one currently exists. Engineers project it could dramatically cut launch costs if built, though it remains theoretical, not engineered.", "I-XPO-040": "Nuclear fusion promises abundant, low-waste energy, and experimental reactors have achieved brief energy gains, but no commercial fusion power plant exists yet. If developed, energy analysts project it could sharply cut fossil fuel reliance and reshape electricity costs, though most experts still estimate decades before commercial viability.", "I-XPO-041": "Self-replicating factories that build copies of themselves using space resources have been proposed in engineering research but never built, remaining a theoretical concept. If realized, some engineers speculate this could dramatically lower the cost of large-scale space construction, though the underlying technology is far from demonstrated.", "I-XPO-042": "Terraforming Mars, making its atmosphere and surface habitable without pressure suits, has been studied conceptually by scientists, who estimate it would require warming the planet and thickening its thin atmosphere over centuries, using enormous amounts of energy and resources. No technology capable of this exists today.", "I-XPO-043": "A generation ship, where a crew's descendants would complete a multi-century journey to another star, has been studied theoretically by aerospace researchers but never built or attempted. Proposals speculate about self-sufficient ecosystems and social structures needed, but many core engineering and sociological questions remain entirely unresolved.", "I-XPO-044": "Quantum computers exist today but remain specialized, expensive, and limited to specific problems like cryptography research and materials science, not general consumer use. If they became widespread, researchers project major shifts to computing-dependent fields, though a 'quantum computer for everyday tasks' isn't currently technically anticipated.", "I-XPO-045": "No permanent lunar base currently exists, though NASA's Artemis program and international partners have published plans for a future outpost. Legal scholars are actively discussing how existing space treaties, which prohibit national ownership of the Moon, would apply to real settlement and resource use, since it hasn't been tested.", "I-XPO-046": "Solar power is a fast-growing share of global electricity but doesn't currently dominate the overall energy mix, which still relies heavily on fossil fuels. Energy analysts project that full dominance would require major grid, storage, and manufacturing changes, with specific infrastructure outcomes depending on technology choices not yet finalized.", "I-XPO-047": "Limited weather modification, like cloud seeding to induce rain, is already used in some regions, but reliable large-scale weather control doesn't currently exist. If developed, researchers speculate it could benefit agriculture but also raises serious concerns about weaponization or disputes between nations over altered rainfall patterns.", "I-XPO-048": "Space-based solar power, satellites collecting sunlight and beaming energy to Earth, has been studied by agencies like Japan's JAXA and the UK, with small-scale tests planned, but no operational network exists yet. If built, analysts project it could shift energy geopolitics, though costs remain a major open barrier.", "I-XPO-049": "Small experimental underwater habitats exist for research purposes, but no underwater city has ever been built for permanent residential housing. Engineers who've studied the concept note major unresolved challenges around pressure, construction cost, and emergency access, meaning it remains a speculative rather than currently viable housing option.", "I-XPO-050": "A small number of paying tourists have already flown to orbit or suborbital space with companies like Virgin Galactic and SpaceX, and many report a shift in perspective sometimes called the 'overview effect.' If such trips become routine and affordable, researchers speculate this altered perspective could spread more broadly, though costs remain high.", "I-XPO-051": "No technology currently exists to copy a functioning mind, and it remains purely theoretical. Philosophers use the scenario to probe personal identity: would the copy be 'you,' a separate person with your memories, or something else entirely, a question current neuroscience and philosophy can't resolve since it's never been tested.", "I-XPO-052": "No technology exists to transfer a specific memory from one brain to another, let alone swap them completely. Philosophers use this thought experiment to explore what makes memories personal, would a swapped memory still 'belong' to the new owner, or would something essential be lost in the transfer.", "I-XPO-053": "Current AI systems can convincingly pass many conversational tests without most researchers believing they're conscious, since passing a behavioral test doesn't prove inner experience exists. Philosophers debate whether any test could ever definitively prove consciousness in a machine, since we can't directly observe another mind's subjective experience, even in humans.", "I-XPO-054": "Nearly all human societies today recognize some form of private property, though a few small-scale communities and historical experiments have tried collective ownership with mixed results. Political theorists speculate about how resource allocation, incentives, and conflict resolution would work without property rights, drawing on these limited real-world examples.", "I-XPO-055": "Dreams can feel completely real while they're happening, and philosophers have long debated whether there's a foolproof test to distinguish waking life from a dream while inside the experience. Some argue certain checks, like reading text twice, work in dreams, but no universally reliable, moment-to-moment method has been established.", "I-XPO-056": "No technology or condition currently makes lying physically impossible for humans, though some rare medical cases involve very limited truthfulness compulsions. As a thought experiment, philosophers use universal enforced honesty to explore how much of social life, politeness, privacy, negotiation, depends on the ability to withhold or shade the truth.", "I-XPO-057": "Rare medical cases of severe amnesia show people losing most or all memory of their past while retaining basic personality traits and skills. Philosophers debate whether personal identity depends mainly on continuous memory, the physical brain, or something else, using such real cases to test competing theories of selfhood.", "I-XPO-058": "No real economy has ever eliminated scarcity entirely, since even abundant resources face limits like time, attention, or unique experiences. As a thought experiment, economists and philosophers speculate that status, creativity, or relationships might become the new scarce and valued goods if material scarcity were solved.", "I-XPO-059": "No computer simulation of a mind capable of subjective suffering has been built or verified to exist. Philosophers debate whether suffering requires biological substrates or could arise from any sufficiently complex information process, a question with real ethical stakes for how future AI systems might eventually need to be treated.", "I-XPO-060": "No technology currently allows people to read others' thoughts, though brain-scanning research can crudely detect some basic mental states in lab settings. As a thought experiment, philosophers use universal thought-reading to explore how privacy, deception, and social relationships depend on the current boundary between inner thought and outward expression.", "I-XPO-061": "No machine today is considered a moral agent capable of bearing rights or responsibilities the way humans are. Philosophers debate whether a hypothetical fully rational AI would be bound by human moral rules, need different ones suited to its nature, or fall outside moral consideration entirely, an unresolved question in AI ethics.", "I-XPO-062": "Ancient Athens used lottery selection for some public offices, and a few modern citizen assemblies use random selection for advisory roles, but no full national government today is chosen entirely by lottery. Political theorists speculate this 'sortition' system could reduce corruption but raises real questions about expertise and accountability.", "I-XPO-063": "No teleportation technology exists that disassembles and reassembles matter, and it remains purely science fiction. Philosophers use the scenario, where your original body is destroyed and an exact copy created elsewhere, to ask whether the reconstructed person would really be 'you,' or a new individual with your memories.", "I-XPO-064": "No condition currently makes human deception physically impossible; lying, exaggeration, and concealment remain part of everyday communication. As a thought experiment, philosophers explore how relationships, negotiation, and privacy would function if deception were removed entirely, a scenario used to reveal how much social life quietly depends on it.", "I-XPO-065": "Whether the universe is truly infinite in size is itself an open scientific question. If it is infinite and matter is distributed randomly, some physicists argue basic probability implies every possible arrangement of matter, including exact copies of Earth, would eventually recur somewhere, though this remains a mathematical implication, not a confirmed fact.", "I-XPO-066": "No technology allowing faster-than-light communication exists, and it would conflict with Einstein's theory of relativity as currently understood, which treats light speed as an absolute limit. As a thought experiment, physicists and futurists speculate it could transform space exploration, though current physics suggests this may be fundamentally impossible.", "I-XPO-067": "Superconductors that work without expensive cooling don't currently exist despite active research and some disputed claims. If discovered, materials scientists project it could dramatically improve power grids, electronics efficiency, and enable technologies like cheaper magnetic levitation, though which applications would come first depends on unresolved manufacturing questions.", "I-XPO-068": "No medical treatment currently reverses biological aging in adults, though some lab research has partially reversed aging markers in animals. If a human-effective version were developed, researchers speculate it could reshape retirement, healthcare, and population planning, though the technology and its societal effects remain entirely hypothetical for now.", "I-XPO-069": "Early experimental research has demonstrated crude brain-to-brain signal transmission in controlled lab settings, but nothing resembling practical thought communication between people exists. If developed further, researchers speculate it could change intimacy and communication, though current results are far too limited to predict real-world relationship effects.", "I-XPO-070": "Researchers have made early progress reconstructing rough visual impressions from brain activity during sleep using MRI scans, but no device can fully record and replay a dream as a full experience. If developed, scientists speculate it could aid dream research or therapy, though this remains far from realized today.", "I-XPO-071": "Desalination technology exists today but remains energy-intensive and costly at large scale, limiting its use mainly to wealthy, water-scarce regions. If a much cheaper method were developed, agricultural economists project it could significantly expand farmable land in arid regions, though current desalination costs remain a real barrier.", "I-XPO-072": "Despite decades of research, scientists cannot currently predict the specific timing and location of earthquakes with reliable accuracy, only general risk over time. If reliable short-term prediction were achieved, urban planners project it could transform evacuation planning and building codes, though current seismology considers precise prediction extremely difficult.", "I-XPO-073": "Real-time translation apps exist today but still have noticeable delays and frequent errors, especially with idioms and tone. A perfected, instant version doesn't currently exist; if achieved, diplomacy researchers speculate it could reduce misunderstandings in international negotiations, though nuance and cultural context might still pose challenges.", "I-XPO-074": "No antigravity technology exists, and current physics offers no known mechanism for canceling gravity's pull on an object. As a thought experiment, engineers speculate it could revolutionize transportation and construction if it were ever discovered, but nothing in known physics currently suggests this is achievable.", "I-XPO-075": "Programmable matter, material that can reconfigure its own shape and properties on command, exists only in early lab-scale prototypes using modular robotics, not practical products. If scaled up, engineers speculate it could replace many single-purpose physical tools, though current versions are far too limited for real use.", "I-XPO-076": "Current lie-detection tools like polygraphs are unreliable and generally not admissible as definitive courtroom evidence, since they measure stress, not truth directly. If a perfectly accurate method were developed, legal scholars speculate it could transform trials and interrogations, though no such reliable technology currently exists or is close.", "I-XPO-077": "No technology currently exists to extract and store human memories outside the brain for later retrieval or transfer. If developed, researchers speculate it could aid memory-loss treatment or preserve personal history, though current neuroscience is still working out how memories are even encoded well enough to attempt this.", "I-XPO-078": "Current weather forecasting is reasonably reliable only about 7-10 days ahead, because the atmosphere is chaotic and small errors compound quickly beyond that. A system reliably predicting decades ahead doesn't exist and may be fundamentally impossible given known atmospheric physics, though it's a useful scenario for exploring planning benefits.", "I-XPO-079": "Researchers have built small-scale devices that mimic photosynthesis to produce fuel from sunlight, water, and carbon dioxide, but no industrial-scale version exists yet. If scaled up, energy analysts project it could provide a renewable fuel source, though efficiency and cost challenges currently keep it in the research stage.", "I-XPO-080": "NASA's 2022 DART mission successfully altered an asteroid's orbit by crashing a spacecraft into it, proving basic deflection is possible, though a fully reliable system for deflecting a real threatening asteroid isn't yet established. If perfected, risk planners project it could remove asteroid impact from long-term catastrophic risk lists.", "I-XPO-081": "Europa, one of Jupiter's moons, has a liquid ocean beneath its icy crust that scientists consider a promising place to search for microbial life, though none has been found yet, since no mission has directly sampled it. If life exists there, astrobiologists speculate it could resemble Earth's deep-sea chemosynthetic organisms.", "I-XPO-082": "Given the huge number of stars and likely planets in the universe, some scientists expected we'd have detected signs of other civilizations by now, a puzzle called the Fermi Paradox. Proposed explanations range from intelligent life being extremely rare to civilizations self-destructing, but no explanation has been confirmed.", "I-XPO-083": "All known life on Earth is carbon-based, since carbon bonds well with many elements to form complex molecules. Scientists have speculated silicon or other chemistries could theoretically support alien life, but no such life has ever been found, so these remain untested hypotheses grounded in chemistry, not confirmed possibility.", "I-XPO-084": "No confirmed evidence of extraterrestrial life, microbial or otherwise, has ever been found. If discovered, scientists and policy researchers who've studied the scenario project significant scientific excitement and likely public interest, though predicting exact societal, religious, and political reactions remains speculative since it has never actually happened.", "I-XPO-085": "No confirmed contact with non-human intelligence has occurred, despite programs like SETI scanning for signals for decades. If contact happened, researchers who study the problem speculate that shared mathematics or physics might provide a common starting point, though truly alien cognition could make full communication difficult or impossible.", "I-XPO-086": "On Earth, only humans among many intelligent species, octopuses and dolphins are also considered highly intelligent, developed technology and civilization, suggesting intelligence alone doesn't guarantee it. Scientists debate whether specific factors like hands or vocal capability were necessary, meaning intelligent alien life elsewhere might not build technology either.", "I-XPO-087": "No life has ever been confirmed in a gas giant's atmosphere, and Earth has no equivalent gas-giant ecosystem to study directly. Astrobiologists have speculated about floating, balloon-like organisms adapted to atmospheric pressure and chemistry, drawing loosely on Earth's high-altitude and deep-ocean life, but this remains entirely theoretical.", "I-XPO-088": "With one confirmed example of intelligent life, humans, on Earth, and no other data points, estimating how often it might evolve elsewhere in a galaxy is highly uncertain. Various famous equations attempt to model the probability, but too many unknown variables remain for a reliable answer.", "I-XPO-089": "Earth has been leaking radio and TV broadcasts into space for about a century, signals that would be extremely faint by the time they reached other star systems. Researchers who study this project other civilizations might similarly leak detectable signals, but no such signal from elsewhere has ever been confirmed.", "I-XPO-090": "Silicon, like carbon, can form some complex bonds, leading to speculation about silicon-based life as a science fiction staple. But chemists note silicon compounds are generally less stable and versatile than carbon ones under conditions found on known planets, making it considered unlikely, though not entirely ruled out.", "I-XPO-091": "No confirmed sign of life has been detected on any exoplanet, though telescopes like the James Webb Space Telescope now analyze distant planetary atmospheres for chemical clues, such as unusual gas combinations. If found, scientists project it would likely be indirect chemical evidence rather than a clear image or direct proof.", "I-XPO-092": "Human civilization is only a few thousand years old technologically, so a civilization millions of years more advanced has no real precedent to compare against. Researchers who speculate on this suggest such a civilization's goals and behavior might be as incomprehensible to us as ours would be to insects.", "I-XPO-093": "A tidally locked planet always shows the same face to its star, creating permanent day on one side and permanent night on the other, a real class of planet astronomers have identified around some distant stars. Scientists speculate life there might cluster in a temperate twilight zone between the extremes.", "I-XPO-094": "Panspermia is the hypothesis that life's basic building blocks, or even microbial life itself, arrived on Earth from space via comets or meteorites rather than originating here from scratch. Some organic molecules found in meteorites support the idea being possible, but it remains unproven and doesn't fully explain life's ultimate origin.", "I-XPO-095": "On Earth, ecosystems around deep-sea hydrothermal vents already thrive without sunlight, using chemosynthesis, deriving energy from chemical reactions instead. Astrobiologists speculate similar chemistry could support life on moons like Europa or Enceladus that have oceans but no surface sunlight, though no such alien ecosystem has been confirmed.", "I-XPO-096": "Gene editing technology like CRISPR already allows some genetic modification in research settings, but widespread genetic enhancement of children for traits like intelligence or appearance is not currently practiced and remains ethically and legally restricted in most countries. If normalized, researchers project it could raise new inequality and identity concerns.", "I-XPO-097": "Current maximum verified human lifespan is around 122 years, and no medical technology currently allows regular lifespans past 150. If life-extension research eventually achieved this, demographers and economists project major disruption to retirement, fa
