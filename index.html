mily structure, and resource planning, though this remains a distant hypothetical, not close to realized.", "I-XPO-098": "No artificial general intelligence, a system matching broad human-level reasoning across domains, currently exists; today's AI is specialized. Legal and ethics scholars are already debating what rights such a system might warrant if developed, but the question remains theoretical since no AGI has been built to test against.", "I-XPO-099": "Early brain-computer interfaces, like experimental implants that let paralyzed patients control devices with thought, exist today but remain narrow and medical rather than general cognitive enhancement. If broader merging technology developed, researchers speculate it could blur lines between human and computational work, though this remains a long way off.", "I-XPO-100": "Advanced prosthetic limbs already restore significant function for amputees today, and research continues on more capable versions. If cybernetic replacement became common even for non-medical enhancement, researchers speculate it could normalize new body modification and reshape ideas about physical ability, though this level of adoption doesn't currently exist.", "I-XPO-101": "Experimental artificial womb technology has successfully supported premature lambs for short periods in lab research, but no device has been used to gestate a human fetus from conception, and this remains far from clinical reality. If developed for humans, researchers project major shifts to pregnancy and reproductive rights debates.", "I-XPO-102": "No technology exists to copy a mind into multiple separate bodies simultaneously, and it remains purely theoretical. Philosophers use the scenario to probe whether identity is singular or could exist as multiple equally valid instances at once, a question current science has no way to test.", "I-XPO-103": "Automation already replaces some physical labor jobs in manufacturing and logistics, though full automation of physical labor across the economy hasn't happened. Sociologists project that if it did, status markers currently tied to work and skill could shift toward other measures like creativity or social contribution, though this remains speculative.", "I-XPO-104": "Gene editing that changes traits passed to future generations, called germline editing, is technically possible with tools like CRISPR but is banned or heavily restricted in most countries due to safety and ethical concerns. Bioethicists are actively debating what rules should eventually govern it if restrictions ever loosen.", "I-XPO-105": "No technology currently eliminates involuntary death, and any such biological breakthrough remains far outside current medical capability. As a thought experiment, economists and ethicists speculate a species without death would need entirely new approaches to population growth and resource allocation, since current systems assume ongoing generational turnover.", "I-XPO-106": "Early brain-computer interfaces today mainly assist people with severe disabilities in controlling devices, far from enabling direct knowledge transfer or learning. If interface technology advanced dramatically, education researchers speculate it could change how skills are taught and assessed, though current neuroscience is nowhere near supporting this kind of learning.", "I-XPO-107": "Some medications already influence mood and emotional states, like antidepressants, but precise, at-will tuning of specific emotions doesn't currently exist as consumer technology. If developed, researchers speculate it could change how people navigate conflict and intimacy in relationships, though such fine-grained emotional control remains scientifically far off.", "I-XPO-108": "No economy today has eliminated the need for most people to work, though automation has reduced labor needs in some sectors. Economists and sociologists speculate that if paid work became optional for most people, free time might shift toward creative, caregiving, or community activities, though this remains untested at scale.", "I-XPO-109": "Medical technology today allows some body modification, including gender-affirming procedures, but full, freely accessible modification of any physical trait doesn't currently exist. If it did, researchers speculate ideas about gender and physical identity could become more fluid, though this remains a hypothetical extension of current, more limited capabilities.", "I-XPO-110": "Legal personhood today is generally tied to being a living human, though some legal systems have granted limited rights to non-human entities like corporations or rivers. No artificial mind has been recognized as a person anywhere. Philosophers and legal scholars debate what criteria, consciousness, reasoning, suffering, might eventually apply.", "I-XPO-111": "Many large carnivore populations are declining today due to habitat loss and hunting, and some ecosystems have already seen smaller predators expand into vacated roles after large carnivore losses. Ecologists project this pattern could continue, though which specific species would evolve or expand to fill particular niches is uncertain.", "I-XPO-112": "Human extinction hasn't occurred, and biologists have no direct precedent to draw from for this exact scenario. Based on how ecosystems recovered after past mass extinctions and how species already expand into human-altered spaces, biologists speculate other species would eventually diversify to fill vacated ecological roles over time.", "I-XPO-113": "On Earth, dexterous hands are linked to tool use in intelligent species like humans, but dolphins and elephants show notable intelligence without hands, using other methods for interacting with their environment. Researchers speculate hand-less intelligent species might rely more on vocal communication or specialized non-manual tool use.", "I-XPO-114": "The asteroid impact 66 million years ago is widely credited with ending the dinosaur era, and without it, paleontologists speculate dinosaurs might have continued evolving and diversifying, potentially delaying or preventing mammals' later rise to dominance. This remains speculative reconstruction based on trends visible before the extinction event.", "I-XPO-115": "No permanent human space colony exists yet, so there's no direct evidence of how space conditions might shape human evolution over generations. Biologists speculate that traits suited to reduced gravity or radiation exposure could theoretically be favored over very long timescales, though meaningful evolutionary change would take many generations.", "I-XPO-116": "Photosynthesis on Earth is tuned to our sun's light spectrum, using mostly red and blue light for chlorophyll. Around a red dwarf star, which emits different wavelengths, astrobiologists speculate plant-like organisms might evolve differently colored pigments to capture available light efficiently, though no such alien life has been observed.", "I-XPO-117": "Insects today are limited in size partly by how oxygen diffuses through their simple breathing tubes, though fossil evidence shows much larger insects existed when atmospheric oxygen was higher, hundreds of millions of years ago. Paleontologists use that evidence to speculate about how giant insects might behave and compete today.", "I-XPO-118": "Ocean temperatures are already rising measurably due to climate change, and marine biologists have documented some species shifting ranges toward cooler waters in response. Under continued warming of several degrees, researchers project significant coral die-off and species redistribution, though which specific species will adapt successfully remains actively studied.", "I-XPO-119": "All known complex life on Earth descends from one common ancestor, and no second, independent origin of life has ever been found, despite searches in extreme environments. If one existed, biologists speculate it might use a different genetic code or biochemistry entirely, since it would have evolved separately from the start.", "I-XPO-120": "Feathers, which evolved from dinosaur scales, enabled bird flight, but other flying animals like bats and insects evolved entirely different flight structures, skin membranes and hardened wings. Paleontologists use these alternate paths to speculate birds might have evolved membrane-based wings instead, similar to bats, absent feather evolution.", "I-XPO-121": "The simulation hypothesis proposes our entire reality could be a highly advanced computer simulation rather than base physical reality. Some physicists and philosophers have proposed possible detectable signatures, like patterns in physical constants, but no evidence supporting or ruling out the idea has been found, and it may be untestable.", "I-XPO-122": "If a simulation were sophisticated enough, philosophers argue it could be designed to be indistinguishable from base reality from the inside, since simulated physics could perfectly mimic real physics. Some researchers have proposed theoretical tests looking for computational limits or artifacts, but no method has been shown to reliably work.", "I-XPO-123": "Some theories in physics, including certain versions of string theory and cosmic inflation, mathematically allow for other universes with different fundamental constants than ours. But because we can't observe beyond our own universe, this remains a mathematical possibility rather than something that could currently be tested or confirmed.", "I-XPO-124": "The 'many-worlds' interpretation of quantum mechanics proposes that every possible outcome of a quantum event actually happens, each in its own separate branching universe, rather than randomness just picking one outcome. It's a serious, debated interpretation among physicists, but it makes no different testable predictions from other interpretations so far.", "I-XPO-125": "Multiverse theories propose other universes exist beyond our observable one, but because they're by definition beyond our ability to directly observe or interact with, many physicists question whether the idea can ever be scientifically tested rather than just a compelling but unfalsifiable mathematical framework."};
const APP_VERSION="1.3";
// --- runtime storage detection: is durable auto-save available here? ---
let STORAGE_OK=false;
try{localStorage.setItem('__probe','1');localStorage.removeItem('__probe');STORAGE_OK=true;}catch(e){}
let PERSISTED=null; // null=unknown, true=granted persistent mode
function reqPersist(){
 try{
  if(navigator.storage&&navigator.storage.persist){
   navigator.storage.persisted().then(p=>{if(p){PERSISTED=true;return true;}return navigator.storage.persist();})
    .then(g=>{PERSISTED=!!g;}).catch(()=>{});
  }
 }catch(e){}
}
const BLOCK=200, REPEAT_FRAC=0.05;
const KEY="interest_instrument_v1";
const featLabels=["large scale","past","present","future","timeless","about people","abstract idea","open / unknown","systems & feedback","how-it-works","story-driven","practical","aesthetic","risk / danger","numbers"];
function feat(it){const t=it.tags;const oh={past:[1,0,0,0],present:[0,1,0,0],future:[0,0,1,0],timeless:[0,0,0,1]}[t.time];
 return [(t.scale-1)/3,...oh,t.human,(t.abstract-1)/2,(t.epistemic-1)/2,t.system,t.mechanism,t.narrative,t.practical,t.aesthetic,t.risk,t.quant];}
const NF=15;
// standardization params over full bank
let MU=new Array(NF).fill(0), SD=new Array(NF).fill(1);
(function(){const X=BANK.map(feat);for(let j=0;j<NF;j++){let m=0;for(const x of X)m+=x[j];m/=X.length;let v=0;for(const x of X)v+=(x[j]-m)**2;v/=X.length;MU[j]=m;SD[j]=Math.sqrt(v)||1;}})();
function stdz(x){return x.map((v,j)=>(v-MU[j])/SD[j]);}
function sig(z){return 1/(1+Math.exp(-z));}
// logistic regression, returns weights[NF]+bias
function train(rows){ // rows: [{f:stdz, y}]
 let w=new Array(NF).fill(0), b=0; const lr=0.3, l2=0.01, iters=350, n=rows.length;
 if(n<8) return {w,b,trained:false};
 for(let t=0;t<iters;t++){let gw=new Array(NF).fill(0),gb=0;
  for(const r of rows){const p=sig(r.f.reduce((s,v,j)=>s+v*w[j],0)+b);const e=p-r.y;for(let j=0;j<NF;j++)gw[j]+=e*r.f[j];gb+=e;}
  for(let j=0;j<NF;j++)w[j]-=lr*(gw[j]/n+l2*w[j]);b-=lr*gb/n;}
 return {w,b,trained:true};
}
function predict(model,it){const f=stdz(feat(it));return sig(f.reduce((s,v,j)=>s+v*model.w[j],0)+model.b);}
// seeded RNG
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
let RNG=mulberry32(Date.now());
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(RNG()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const byId=Object.fromEntries(BANK.map(it=>[it.id,it]));
const byDom={};BANK.forEach(it=>{(byDom[it.id.slice(2,5)] ||= []).push(it.id);});
const DOMS=Object.keys(byDom).sort();

let S=null; // state
function load(){
 try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
 try{const b=localStorage.getItem(KEY+'_bak');if(b)return JSON.parse(b);}catch(e){}
 return null;
}
function save(){
 try{
  const j=JSON.stringify(S);
  localStorage.setItem(KEY,j);
  if(S.responses.length%25===0)localStorage.setItem(KEY+'_bak',j); // rolling second copy vs corruption
 }catch(e){}
}
function answeredNew(){return new Set(S.responses.filter(r=>!r.rep).map(r=>r.id));}
function firstBlockOf(id){const r=S.responses.find(x=>x.id===id&&!x.rep);return r?r.block:null;}

function stratifiedRoundRobin(pool,count){ // pool: array of ids; balance across domains
 const groups={};for(const id of pool){(groups[id.slice(2,5)] ||= []).push(id);}
 for(const k in groups)groups[k]=shuffle(groups[k]);
 const order=shuffle(DOMS.filter(d=>groups[d]&&groups[d].length));
 const out=[];let i=0;
 while(out.length<count){const d=order[i%order.length];i++;if(groups[d]&&groups[d].length)out.push(groups[d].pop());
  if(order.every(d=>!groups[d]||!groups[d].length))break;}
 return out;
}
function buildBlock(){
 const ans=answeredNew();
 const unseen=BANK.map(it=>it.id).filter(id=>!ans.has(id));
 if(!unseen.length)return [];
 const size=Math.min(BLOCK,unseen.length);
 let picks=[];
 if(S.model&&S.model.trained&&S.blockIndex>0){
  const scored=unseen.map(id=>({id,u:Math.abs(predict(S.model,byId[id])-0.5)})).sort((a,b)=>a.u-b.u);
  const nUnc=Math.round(size*0.6);
  picks=scored.slice(0,nUnc).map(o=>o.id);
  const rest=unseen.filter(id=>!picks.includes(id));
  picks=picks.concat(stratifiedRoundRobin(rest,size-picks.length));
 } else {
  picks=stratifiedRoundRobin(unseen,size);
 }
 // reliability repeats from block 3 (index>=2)
 let reps=[];
 if(S.blockIndex>=2){
  const eligible=[...ans].filter(id=>firstBlockOf(id)!==null&&firstBlockOf(id)<=S.blockIndex-1);
  reps=shuffle(eligible).slice(0,Math.round(size*REPEAT_FRAC)).map(id=>({id,rep:true}));
 }
 let block=picks.map(id=>({id,rep:false})).concat(reps);
 block=shuffle(block);
 return block;
}

function fitModel(){
 const rows=[];const seen=new Set();
 for(const r of S.responses){if(r.rep)continue;if(seen.has(r.id))continue;seen.add(r.id);rows.push({f:stdz(feat(byId[r.id])),y:r.ans});}
 S.model=train(rows);
}

function start(name){
 const seed=(Date.now()>>>0)^(name?name.length*2654435761:0);
 RNG=mulberry32(seed>>>0);
 S={participant:name||"anon",createdAt:new Date().toISOString(),seed:seed>>>0,appVersion:APP_VERSION,bankVersion:BANK.length,
    responses:[],blockIndex:0,block:null,pos:0,model:null,explained:{},lastExport:0};
 reqPersist();
 S.block=buildBlock();save();render();
}

function currentItem(){if(!S.block||S.pos>=S.block.length)return null;return S.block[S.pos];}
let shownAt=0;

function answer(val){
 const cur=currentItem();if(!cur)return;
 const rt=Date.now()-shownAt;
 S.responses.push({id:cur.id,ans:val,rt_ms:rt,ts:new Date().toISOString(),block:S.blockIndex,rep:!!cur.rep,explained:!!S._explained});
 S._explained=false;S.pos++;save();
 if(S.pos>=S.block.length){fitModel();S.blockIndex++;save();renderBreak();}
 else render();
}

function totalAnswered(){return S.responses.filter(r=>!r.rep).length;}

function render(){
 const cur=currentItem();
 if(!cur){renderBreak();return;}
 const it=byId[cur.id];const dom=DOMS_NAMES[it.id.slice(2,5)]||it.id.slice(2,5);
 const g=GLOSS[it.id];
 const done=totalAnswered();const pct=(done/BANK.length*100).toFixed(1);
 const el=document.getElementById('app');
 el.innerHTML=`<div class="top"><span>Item ${done+1} / ${BANK.length}</span><span>${STORAGE_OK?'':'⚠️ no auto-save · '}Block ${S.blockIndex+1} · <a class="saveln" id="ck">${STORAGE_OK?'backup':'save progress'}</a></span></div>
 <div class="bar"><i style="width:${pct}%"></i></div>
 <div class="card">
   <div class="dom">${dom}</div>
   <div class="q">${esc(it.text)}</div>
   ${g?`<div class="explain"><button id="exp">Explain in plain English</button><div class="gloss" id="gl">${esc(g)}</div></div>`:''}
   <div class="btns"><button class="bno" id="no">No</button><button class="byes" id="yes">Yes</button></div>
   <div class="hint">Tap or press N / Y &nbsp;·&nbsp; answer on instinct, ~5 seconds</div>
 </div>`;
 document.getElementById('yes').onclick=()=>answer(1);
 document.getElementById('no').onclick=()=>answer(0);
 document.getElementById('ck').onclick=renderExport;
 if(g){document.getElementById('exp').onclick=()=>{document.getElementById('gl').style.display='block';document.getElementById('exp').style.display='none';S._explained=true;};}
 shownAt=Date.now();
}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function insights(){
 if(!S.model||!S.model.trained)return '';
 const w=S.model.w.map((v,j)=>({l:featLabels[j],v})).sort((a,b)=>b.v-a.v);
 const pos=w.filter(x=>x.v>0).slice(0,5),neg=w.filter(x=>x.v<0).slice(-5).reverse();
 // domain leaning
 const dm=DOMS.map(d=>{const ids=byDom[d];let s=0;ids.forEach(id=>s+=predict(S.model,byId[id]));return{d,p:s/ids.length};}).sort((a,b)=>b.p-a.p);
 const yes=S.responses.filter(r=>!r.rep&&r.ans===1).length,tot=totalAnswered();
 return `<div class="stat"><h3>Interim read after ${tot} answers (${(yes/tot*100).toFixed(0)}% yes)</h3>
   <div class="row"><span class="mut">Pulls you toward YES</span><span></span></div>
   ${pos.map(x=>`<div class="row"><span class="pos">${x.l}</span><span class="mut">+${x.v.toFixed(2)}</span></div>`).join('')}
   <div class="row"><span class="mut">Pulls you toward NO</span><span></span></div>
   ${neg.map(x=>`<div class="row"><span class="neg">${x.l}</span><span class="mut">${x.v.toFixed(2)}</span></div>`).join('')}
 </div>
 <div class="stat"><h3>Domains ranked by predicted interest</h3>
   ${dm.slice(0,5).map(x=>`<div class="row"><span class="pos">${DOMS_NAMES[x.d]}</span><span class="mut">${(x.p*100).toFixed(0)}%</span></div>`).join('')}
   ${dm.slice(-3).map(x=>`<div class="row"><span class="neg">${DOMS_NAMES[x.d]}</span><span class="mut">${(x.p*100).toFixed(0)}%</span></div>`).join('')}
 </div>
 <p class="hint">Early estimate — sharpens with every block. This is computed on your phone; nothing is sent anywhere.</p>`;
}

function renderBreak(){
 const done=totalAnswered();const el=document.getElementById('app');
 if(done>=BANK.length){renderDone();return;}
 el.innerHTML=`<div class="screen">
   <h1>Block ${S.blockIndex} complete</h1>
   <p class="lead">${done} of ${BANK.length} answered. ${STORAGE_OK
     ?'Every answer is saved on this device the moment you tap it — switching apps, locking, or powering off loses nothing. Just come back whenever.'
     :'⚠️ This viewer cannot save to the device. Progress lives only in this open view — export a checkpoint before closing, and paste it on the start screen later to resume.'}</p>
   ${(function(){const since=done-(S.lastExport||0);return (STORAGE_OK&&since>=100)?`<p class="lead">💾 ${since} answers since your last off-device backup — worth a 10-second export below in case this device is ever lost or its browser data cleared.</p>`:'';})()}
   ${insights()}
   <button class="big" id="cont">Continue (${Math.min(BLOCK,BANK.length-done)} more)</button>
   <button class="ghost" id="exp">Export checkpoint (JSON)</button>
 </div>`;
 document.getElementById('cont').onclick=()=>{S.block=buildBlock();S.pos=0;save();render();};
 document.getElementById('exp').onclick=renderExport;
}
function renderDone(){
 const el=document.getElementById('app');
 el.innerHTML=`<div class="screen"><h1>All ${BANK.length} answered 🎉</h1>
  <p class="lead">Export your full response set below and send it back to your analysis session to generate the final profile: the one-paragraph answer, your interest-generator principles, and the validation gates.</p>
  ${insights()}
  <button class="big" id="exp">Export full dataset (JSON)</button></div>`;
 document.getElementById('exp').onclick=renderExport;
}

function payload(){
 return JSON.stringify({meta:{participant:S.participant,createdAt:S.createdAt,exportedAt:new Date().toISOString(),
   appVersion:APP_VERSION,seed:S.seed,nItems:BANK.length,nAnswered:totalAnswered()},
   model:S.model,responses:S.responses},null,0);
}
function goBack(){
 if(!S){renderIntro();return;}
 if(currentItem())render();else renderBreak();
}
function renderExport(){
 const p=payload();const done=totalAnswered();const full=done>=BANK.length;
 const el=document.getElementById('app');
 el.innerHTML=`<div class="screen">
  <h1>${full?'Export full dataset':'Export checkpoint'}</h1>
  <p class="lead">${done} of ${BANK.length} answered. Copy this JSON and paste it into your Claude chat (or save it in Notes). Pasting it on this instrument's start screen later resumes exactly from here.</p>
  <textarea class="exp" id="pl" readonly></textarea>
  <button class="big" id="cp">Copy to clipboard</button>
  <button class="ghost" id="dl">Download as .json file</button>
  <button class="ghost" id="bk">${full?'Back to summary':'Back to questions'}</button>
  <p class="hint" id="st"></p>
 </div>`;
 document.getElementById('pl').value=p;
 const st=document.getElementById('st');
 const markExported=()=>{if(S){S.lastExport=totalAnswered();save();}};
 const fin=ok=>{st.textContent=ok?'✓ Copied — now paste it into your Claude chat.':'Automatic copy was blocked here — tap the box above, Select All, then Copy.';st.className=ok?'hint okmsg':'hint';if(ok)markExported();};
 const manual=()=>{try{const ta=document.getElementById('pl');ta.focus();ta.select();ta.setSelectionRange(0,p.length);fin(document.execCommand('copy'));}catch(e){fin(false);}};
 document.getElementById('cp').onclick=()=>{
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(p).then(()=>fin(true),manual);}
  else manual();
 };
 document.getElementById('dl').onclick=()=>{
  try{
   const blob=new Blob([p],{type:'application/json'});
   const a=document.createElement('a');a.href=URL.createObjectURL(blob);
   a.download=`interest-responses-${new Date().toISOString().slice(0,10)}.json`;
   document.body.appendChild(a);a.click();a.remove();
   st.textContent='Download triggered — if nothing happened, this viewer blocks downloads; use Copy instead.';st.className='hint';markExported();
  }catch(e){st.textContent='Download blocked in this viewer — use Copy to clipboard instead.';st.className='hint';}
 };
 const bk=document.getElementById('bk');if(bk)bk.onclick=goBack;
}
function importData(txt){
 let d;try{d=JSON.parse(txt);}catch(e){return 'That doesn’t parse as JSON — paste the full export, from { to }.';}
 const rs=Array.isArray(d)?d:d.responses;
 if(!Array.isArray(rs)||!rs.length||!rs[0].id)return 'No responses found in that data.';
 const known=rs.filter(r=>byId[r.id]);
 if(!known.length)return 'None of those item IDs match this question bank.';
 const meta=(d.meta||{});
 const seed=(meta.seed>>>0)||1;
 RNG=mulberry32(seed);
 S={participant:meta.participant||'anon',createdAt:meta.createdAt||new Date().toISOString(),seed,
    appVersion:APP_VERSION,bankVersion:BANK.length,
    responses:known,blockIndex:Math.max(0,...known.map(r=>r.block||0))+1,
    block:null,pos:0,model:null,explained:{},_explained:false,
    lastExport:known.filter(r=>!r.rep).length};
 reqPersist();
 fitModel();save();
 return null;
}

function renderIntro(){
 const el=document.getElementById('app');
 el.innerHTML=`<div class="screen">
  <h1>What I find interesting</h1>
  <p class="lead">${BANK.length} short prompts spanning all of human knowledge — including open mysteries and hypotheticals. For each: <b>Yes</b> if it makes you want to know more, <b>No</b> if not. Answer on instinct in a few seconds. There are no wrong answers; the goal is to model the pattern underneath.</p>
  <p class="lead">It runs in blocks of ${BLOCK} and adapts to you as you go. Nothing leaves this device until you export it. ${STORAGE_OK
    ?'Every answer is auto-saved here the instant you tap it — dip in and out, switch apps, or power off freely; reopening this page picks up exactly where you left off.'
    :'⚠️ This viewer cannot auto-save: if you close it mid-run, unsaved answers are lost. Use the in-run export to checkpoint, and paste a checkpoint below to resume.'}</p>
  <input type="text" id="nm" placeholder="Your name or initials (optional)">
  <button class="big" id="go">Start</button>
  <button class="ghost" id="res">Resume from a saved export</button>
  <div id="resbox" style="display:none">
   <textarea class="exp" id="rtxt" placeholder="Paste your exported JSON here"></textarea>
   <button class="big" id="doimp" style="margin-top:10px">Import &amp; resume</button>
   <p class="hint" id="rst"></p>
  </div>
 </div>`;
 document.getElementById('go').onclick=()=>start(document.getElementById('nm').value.trim());
 document.getElementById('res').onclick=()=>{const b=document.getElementById('resbox');b.style.display=b.style.display==='none'?'block':'none';};
 document.getElementById('doimp').onclick=()=>{
  const err=importData(document.getElementById('rtxt').value.trim());
  if(err){const r=document.getElementById('rst');r.textContent=err;r.className='hint';}
  else renderBreak();
 };
}

const DOMS_NAMES={PHY:"Physical universe",ERT:"Earth & environment",LIF:"Life & biology",MND:"Mind & brain",HLT:"Body & health",TEC:"Technology & engineering",MTH:"Mathematics & logic",HIS:"History & archaeology",SOC:"Society & institutions",ECO:"Money, markets & business",CUL:"Culture & the arts",LNG:"Language & communication",PHL:"Philosophy, ethics & belief",DAY:"Everyday & practical",UNK:"Frontiers & unknowns",XPO:"Speculative & what-if"};

document.addEventListener('keydown',e=>{const k=e.key.toLowerCase();
 if(e.target&&(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'))return;
 if(S&&currentItem()){if(k==='y')answer(1);if(k==='n')answer(0);}});

S=load();
if(S&&S.responses){reqPersist();RNG=mulberry32(S.seed>>>0);if(!S.block||S.pos>=(S.block?S.block.length:0)){if(totalAnswered()>=BANK.length){renderDone();}else{renderBreak();}}else{render();}}
else{renderIntro();}
</script>
</body>
</html>
